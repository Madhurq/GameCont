# Prometheus config for local development
# Scrapes the Spring Boot actuator endpoint for platform metrics.
# In production, this also scrapes game server metrics sidecars (port 9090).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Platform API (Spring Boot Actuator)
  - job_name: 'gamecont-platform'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          application: 'gamecont-platform'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
