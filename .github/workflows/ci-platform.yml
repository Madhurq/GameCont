# ═══════════════════════════════════════════════════════════════
# GameCont — Platform API CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════
# Triggered on pushes to main that affect the platform-api.
# Steps: Test → Build Docker Image → Push to GHCR → Deploy to K3s
name: CI/CD — Platform API

on:
  push:
    branches: [main]
    paths:
      - 'platform-api/**'
      - '.github/workflows/ci-platform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'platform-api/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/gamecont-platform
  JAVA_VERSION: '21'

jobs:
  # ── Test ────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn clean test -B -q

  # ── Build & Push Docker Image ──────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR (skip tests — already passed)
        working-directory: platform-api
        run: mvn clean package -B -q -DskipTests

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: platform-api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ── Deploy to K3s ──────────────────────────────────────────
  deploy:
    name: Deploy to K3s
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to K3s via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.K3S_HOST }}
          username: ec2-user
          key: ${{ secrets.K3S_SSH_KEY }}
          script: |
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            # Rolling restart with the new image
            kubectl set image deployment/gamecont-api \
              api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
              --namespace gamecont-platform

            # Wait for rollout
            kubectl rollout status deployment/gamecont-api \
              --namespace gamecont-platform \
              --timeout=120s
