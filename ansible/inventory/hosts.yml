# ═══════════════════════════════════════════════════════════════
# GameCont — Ansible Inventory
# ═══════════════════════════════════════════════════════════════
# Update the IP address after running Terraform:
#   terraform output k3s_public_ip
all:
  vars:
    ansible_user: ec2-user
    ansible_ssh_private_key_file: ~/.ssh/gamecont.pem
    project_name: gamecont

  hosts:
    k3s-server:
      ansible_host: "{{ k3s_public_ip | default('REPLACE_WITH_TERRAFORM_OUTPUT') }}"
