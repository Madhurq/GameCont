# ═══════════════════════════════════════════════════════════════
# GameCont — Monitoring Deployment Playbook
# ═══════════════════════════════════════════════════════════════
# Deploys Prometheus to the gamecont-platform namespace for
# scraping game server metrics sidecars and platform API actuator.
#
# Usage:
#   ansible-playbook -i inventory/hosts.yml playbooks/deploy-monitoring.yml
---
- name: Deploy Monitoring Stack
  hosts: k3s-server
  become: true

  vars:
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml

  tasks:
    - name: Copy Prometheus config
      ansible.builtin.copy:
        src: ../../monitoring/prometheus/prometheus.yml
        dest: /opt/gamecont/monitoring/prometheus.yml
        mode: '0644'

    - name: Deploy Prometheus via K8s manifests
      ansible.builtin.shell: |
        cat <<'PROMEOF' | kubectl apply -f -
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: prometheus-config
          namespace: gamecont-platform
        data:
          prometheus.yml: |
            global:
              scrape_interval: 15s
              evaluation_interval: 15s

            scrape_configs:
              - job_name: 'platform-api'
                metrics_path: '/actuator/prometheus'
                static_configs:
                  - targets: ['gamecont-api.gamecont-platform.svc.cluster.local:8080']

              - job_name: 'game-servers'
                kubernetes_sd_configs:
                  - role: pod
                    namespaces:
                      names: ['gamecont-servers']
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                    action: keep
                    regex: true
                  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
                    action: replace
                    target_label: __address__
                    regex: (.+)
                    replacement: ${1}:9090
        ---
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: prometheus
          namespace: gamecont-platform
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: prometheus
          template:
            metadata:
              labels:
                app: prometheus
            spec:
              containers:
                - name: prometheus
                  image: prom/prometheus:v2.51.0
                  args:
                    - '--config.file=/etc/prometheus/prometheus.yml'
                    - '--storage.tsdb.path=/prometheus'
                    - '--storage.tsdb.retention.time=7d'
                    - '--web.enable-lifecycle'
                  ports:
                    - containerPort: 9090
                  volumeMounts:
                    - name: config
                      mountPath: /etc/prometheus
                    - name: data
                      mountPath: /prometheus
                  resources:
                    requests:
                      cpu: 50m
                      memory: 64Mi
                    limits:
                      cpu: 200m
                      memory: 256Mi
              volumes:
                - name: config
                  configMap:
                    name: prometheus-config
                - name: data
                  emptyDir: {}
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: prometheus
          namespace: gamecont-platform
        spec:
          type: ClusterIP
          selector:
            app: prometheus
          ports:
            - port: 9090
              targetPort: 9090
        PROMEOF
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Wait for Prometheus to be ready
      ansible.builtin.shell: |
        kubectl rollout status deployment/prometheus \
          --namespace gamecont-platform \
          --timeout=60s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Ensure Grafana config directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt/gamecont/monitoring/grafana/datasources
        - /opt/gamecont/monitoring/grafana/dashboards-prov
        - /opt/gamecont/monitoring/grafana/dashboards

    - name: Copy Grafana datasources configuration
      ansible.builtin.copy:
        src: ../../monitoring/grafana/provisioning/datasources/datasource.yml
        dest: /opt/gamecont/monitoring/grafana/datasources/datasource.yml
        mode: '0644'

    - name: Copy Grafana dashboards provider configuration
      ansible.builtin.copy:
        src: ../../monitoring/grafana/provisioning/dashboards/dashboards.yml
        dest: /opt/gamecont/monitoring/grafana/dashboards-prov/dashboards.yml
        mode: '0644'

    - name: Copy Grafana dashboard JSON configurations
      ansible.builtin.copy:
        src: ../../monitoring/grafana/dashboards/{{ item }}
        dest: /opt/gamecont/monitoring/grafana/dashboards/{{ item }}
        mode: '0644'
      loop:
        - platform-overview.json
        - server-detail.json

    - name: Create Grafana Kubernetes ConfigMaps
      ansible.builtin.shell: |
        kubectl create configmap grafana-datasources --from-file=/opt/gamecont/monitoring/grafana/datasources -n gamecont-platform --dry-run=client -o yaml | kubectl apply -f -
        kubectl create configmap grafana-providers --from-file=/opt/gamecont/monitoring/grafana/dashboards-prov -n gamecont-platform --dry-run=client -o yaml | kubectl apply -f -
        kubectl create configmap grafana-dashboards --from-file=/opt/gamecont/monitoring/grafana/dashboards -n gamecont-platform --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Deploy Grafana via Kubernetes manifests
      ansible.builtin.shell: |
        cat <<'GRAFANAFEOF' | kubectl apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: grafana
          namespace: gamecont-platform
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: grafana
          template:
            metadata:
              labels:
                app: grafana
            spec:
              containers:
                - name: grafana
                  image: grafana/grafana:10.4.1
                  ports:
                    - containerPort: 3000
                  env:
                    - name: GF_SECURITY_ADMIN_PASSWORD
                      value: "admin"
                    - name: GF_USERS_ALLOW_SIGN_UP
                      value: "false"
                    - name: PROMETHEUS_URL
                      value: "http://prometheus.gamecont-platform.svc.cluster.local:9090"
                  volumeMounts:
                    - name: datasources
                      mountPath: /etc/grafana/provisioning/datasources
                    - name: providers
                      mountPath: /etc/grafana/provisioning/dashboards
                    - name: dashboards
                      mountPath: /var/lib/grafana/dashboards
                  resources:
                    requests:
                      cpu: 50m
                      memory: 64Mi
                    limits:
                      cpu: 200m
                      memory: 256Mi
              volumes:
                - name: datasources
                  configMap:
                    name: grafana-datasources
                - name: providers
                  configMap:
                    name: grafana-providers
                - name: dashboards
                  configMap:
                    name: grafana-dashboards
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: grafana
          namespace: gamecont-platform
        spec:
          type: ClusterIP
          selector:
            app: grafana
          ports:
            - port: 3000
              targetPort: 3000
        GRAFANAFEOF
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Wait for Grafana to be ready
      ansible.builtin.shell: |
        kubectl rollout status deployment/grafana \
          --namespace gamecont-platform \
          --timeout=60s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Print Access info
      ansible.builtin.debug:
        msg: |
          Prometheus deployed. Access via: kubectl port-forward -n gamecont-platform svc/prometheus 9090:9090
          Grafana deployed. Access via: kubectl port-forward -n gamecont-platform svc/grafana 3000:3000 (User: admin / Pass: admin)
